# ============================================
# Multi-Sensor LST/SST Pipeline Configuration
# Landsat + MODIS + DEM + Land Cover + Emissivity + Water Mask
# 15-day composites at 30m resolution
# ============================================

# Earth Engine Project ID
ee_project: 'gee-juno'

# Service Account Authentication (fallback)
service_account:
  key_file: '/users_home/cmcc/as24625/gee/gee-juno-cbcb3359e8cd.json'
  email: 'gee-252@gee-juno.iam.gserviceaccount.com'

# Area of Interest (Rome, Italy - extended coastal area)
geometry:
  min_lon: 11.6  # Western boundary (includes Tyrrhenian Sea)
  min_lat: 41.4  # Southern boundary
  max_lon: 13.2  # Eastern boundary
  max_lat: 42.4  # Northern boundary

# Temporal parameters
temporal:
  start_date: '2007-01-01'
  end_date: '2021-12-31'
  interval_days: 15  # 15-day composites

# Spatial parameters
spatial:
  target_resolution: 30  # meters
  tile_size: 0.1

# Landsat sensors configuration
landsat:
  sensors:
    - collection: 'LANDSAT/LT05/C02/T1_L2'
      start_date: '2007-01-01'
      end_date: '2011-12-31'
      name: 'L5'
      thermal_band: 'ST_B6'        # L5 thermal band name in C02
      thermal_wavelength: 11.45    # µm center wavelength for LST formula
    
    - collection: 'LANDSAT/LE07/C02/T1_L2'
      start_date: '2007-01-01'
      end_date: '2021-12-31'
      name: 'L7'
      thermal_band: 'ST_B6'        # L7 thermal band name in C02
      thermal_wavelength: 11.45    # µm center wavelength for LST formula
    
    - collection: 'LANDSAT/LC08/C02/T1_L2'
      start_date: '2013-04-01'
      end_date: '2021-12-31'
      name: 'L8'
      thermal_band: 'ST_B10'       # L8 thermal band name in C02
      thermal_wavelength: 10.895   # µm center wavelength for LST formula
  
  # All Landsat bands (after harmonization to L8-style naming)
  bands:
    # Surface Reflectance (scaled 0-1 after multiply(2.75e-5).add(-0.2))
    - 'SR_B1'      # Coastal/Aerosol (L8 only; zero-filled for L5/L7)
    - 'SR_B2'      # Blue
    - 'SR_B3'      # Green
    - 'SR_B4'      # Red
    - 'SR_B5'      # NIR
    - 'SR_B6'      # SWIR1
    - 'SR_B7'      # SWIR2
    # Thermal
    - 'ST_B10'     # Thermal Infrared (harmonized name)
    # Quality
    - 'QA_PIXEL'   # Quality assessment
  
  max_cloud_cover: 80
  
  path_row_filter:
    enabled: true
    paths: [191]
    rows: []

# MODIS configuration
# IMPORTANT: Use Collection 061 (6.1) - Collection 006 is deprecated
modis:
  collections:
    terra: 'MODIS/061/MOD11A1'   # Collection 6.1 Terra
    aqua: 'MODIS/061/MYD11A1'    # Collection 6.1 Aqua
  
  # All relevant MODIS bands (resampled 1km -> 30m)
  bands:
    - 'LST_Day_1km'      # Daytime LST (raw DN, scale: *0.02 -> Kelvin)
    - 'LST_Night_1km'    # Nighttime LST (raw DN, scale: *0.02 -> Kelvin)
    - 'QC_Day'           # Daytime QC flags
    - 'QC_Night'         # Nighttime QC flags
    - 'Emis_31'          # Band 31 emissivity (scale: *0.002 + 0.49)
    - 'Emis_32'          # Band 32 emissivity (scale: *0.002 + 0.49)
    - 'Day_view_angle'   # Daytime view zenith angle (offset: -65)
    - 'Night_view_angle' # Nighttime view zenith angle (offset: -65)
    - 'Day_view_time'    # Daytime observation time (scale: *0.1 -> hours)
    - 'Night_view_time'  # Nighttime observation time (scale: *0.1 -> hours)

# Static layers (downloaded once - truly time-independent)
static_layers:
  
  dem:
    enabled: true
    collection: 'USGS/SRTMGL1_003'  # SRTM 30m DEM
    bands: ['elevation']
    description: 'Digital Elevation Model (SRTM 30m, static)'
  
  water_mask:
    enabled: true
    sources:
      - collection: 'JRC/GSW1_4/GlobalSurfaceWater'
        band: 'occurrence'
        threshold: 50        # Pixels with >50% water occurrence are water
      
      - collection: 'ESA/WorldCover/v200'
        classes: [80, 90, 95]  # Permanent water, herbaceous wetland, mangroves
    
    description: 'Combined water mask (JRC GSW + ESA WorldCover) - static'

# Dynamic layers (computed per-composite, 15-day frequency)
dynamic_layers:
  
  land_cover:
    enabled: true
    collections:
      - name: 'ESA/WorldCover/v200'
        year_start: 2021
        year_end: 2021
      - name: 'ESA/WorldCover/v100'
        year_start: 2020
        year_end: 2020
    fallback: 'MODIS/061/MCD12Q1'   # For 2007-2019
    
    description: 'ESA WorldCover 10m (2020-2021) + MODIS MCD12Q1 500m (2007-2019)'
    
    esa_classes:
      10: 'Tree cover'
      20: 'Shrubland'
      30: 'Grassland'
      40: 'Cropland'
      50: 'Built-up'
      60: 'Bare / sparse vegetation'
      70: 'Snow and ice'
      80: 'Permanent water bodies'
      90: 'Herbaceous wetland'
      95: 'Mangroves'
      100: 'Moss and lichen'
    
    modis_classes:
      1: 'Evergreen Needleleaf Forests'
      2: 'Evergreen Broadleaf Forests'
      3: 'Deciduous Needleleaf Forests'
      4: 'Deciduous Broadleaf Forests'
      5: 'Mixed Forests'
      6: 'Closed Shrublands'
      7: 'Open Shrublands'
      8: 'Woody Savannas'
      9: 'Savannas'
      10: 'Grasslands'
      11: 'Permanent Wetlands'
      12: 'Croplands'
      13: 'Urban and Built-up Lands'
      14: 'Cropland/Natural Vegetation Mosaics'
      15: 'Permanent Snow and Ice'
      16: 'Barren'
      17: 'Water Bodies'
  
  emissivity:
    enabled: true
    description: 'Land surface emissivity derived from MODIS land cover (IGBP classes)'
    # Values based on Snyder et al. 1998 and Sobrino et al. 2008
    lookup:
      1: 0.990   # Evergreen Needleleaf Forests
      2: 0.990   # Evergreen Broadleaf Forests
      3: 0.990   # Deciduous Needleleaf Forests
      4: 0.990   # Deciduous Broadleaf Forests
      5: 0.990   # Mixed Forests
      6: 0.982   # Closed Shrublands
      7: 0.982   # Open Shrublands
      8: 0.985   # Woody Savannas
      9: 0.980   # Savannas
      10: 0.970  # Grasslands
      11: 0.980  # Permanent Wetlands
      12: 0.985  # Croplands
      13: 0.990  # Urban and Built-up (accounts for concrete/asphalt mix)
      14: 0.985  # Cropland/Natural Vegetation Mosaics
      15: 0.950  # Permanent Snow and Ice
      16: 0.930  # Barren
      17: 0.986  # Water Bodies

# Compositing method
compositing:
  method: 'median'   # 'median' recommended for LST (removes outliers)
  quality_mosaic: true

# Output configuration
output:
  base_dir: './LST_Rome_30m_15day_new'
  subdirs:
    landsat: 'landsat'
    modis: 'modis'
    static: 'static'
  netcdf_filename: 'Rome_MultiSensor_LST_SST_2007_2021.nc'
  netcdf_yearly_subdir: 'netcdf_yearly'

# Download parameters
download:
  timeout_seconds: 600       # Seconds before tile request times out
  delay_between_tiles: 0.1   # Seconds between tile requests (0.1 = ~10x speedup vs 1s)
  delay_between_images: 0.5  # Seconds between composites
  min_tiles_success_ratio: 0.10  # At least 10% of tiles required for valid mosaic
  max_retries: 3

# Logging
logging:
  level: 'INFO'
  log_file: 'multisensor_pipeline.log'
  console_colors: true

# Pipeline automation
pipeline:
  num_validation_cycles: 2
  pause_between_cycles: 5